services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: search-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    healthcheck:
      test: ['CMD-SHELL', 'curl -s -f http://localhost:9200/_cluster/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - es-data:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    container_name: search-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  api:
    build: .
    container_name: search-api
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX=products
      - REDIS_URL=redis://redis:6379
    ports:
      - '3000:3000'

  # One-shot seed job: `docker compose --profile seed run --rm seed`
  seed:
    build: .
    container_name: search-seed
    profiles: ['seed']
    restart: 'no'
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX=products
      - REDIS_URL=redis://redis:6379
    command: ['node', 'dist/seed/seed.command.js']

volumes:
  es-data:
  redis-data:
